name: Portal CI

on:
  push:
    branches: [main]
    paths:
      - "portal/**"
      - ".github/workflows/portal-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "portal/**"
      - ".github/workflows/portal-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_ENTRA_CLIENT_ID: "00000000-0000-0000-0000-000000000000"
          NEXT_PUBLIC_ENTRA_API_SCOPE: "api://ci-placeholder/access_as_user"
          NEXT_PUBLIC_DEV_BYPASS_AUTH: "true"
