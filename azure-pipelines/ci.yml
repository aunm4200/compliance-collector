# -----------------------------------------------------------------------------
# Azure Pipelines — CI for compliance-collector
#
# Runs on every push / PR. Optional replacement for the two GitHub Actions
# workflows (.github/workflows/ci.yml and portal-ci.yml) if you want to
# consolidate everything in Azure DevOps.
# -----------------------------------------------------------------------------

trigger:
  branches:
    include: [main]

pr:
  branches:
    include: [main]

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Quality
    displayName: Lint & test
    jobs:

      - job: Core
        displayName: Python core (v0.3 CLI)
        steps:
          - checkout: self
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.12"
          - script: |
              python -m pip install --upgrade pip
              pip install -e ".[dev]"
            displayName: Install core
          - script: ruff check .
            displayName: ruff check
          - script: ruff format --check .
            displayName: ruff format --check
          - script: pytest -q
            displayName: pytest

      - job: Backend
        displayName: FastAPI backend (v0.4)
        steps:
          - checkout: self
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.12"
          - script: |
              python -m pip install --upgrade pip
              pip install -e ".[dev]"
            workingDirectory: backend
            displayName: Install backend
          - script: ruff check .
            workingDirectory: backend
            displayName: ruff check
          - script: ruff format --check .
            workingDirectory: backend
            displayName: ruff format --check
          - script: pytest -q
            workingDirectory: backend
            displayName: pytest

      - job: Portal
        displayName: Next.js portal (v0.5)
        steps:
          - checkout: self
          - task: NodeTool@0
            inputs:
              versionSpec: "20.x"
          - script: npm ci
            workingDirectory: portal
            displayName: npm ci
          - script: npm run lint
            workingDirectory: portal
            displayName: eslint
          - script: npm run typecheck
            workingDirectory: portal
            displayName: typecheck
          - script: npm test -- --run
            workingDirectory: portal
            displayName: vitest
